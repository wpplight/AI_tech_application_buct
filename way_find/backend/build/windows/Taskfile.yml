version: '3'

vars:
  ROOT_DIR: ..
  FRONTEND_INSTALL: npm install
  FRONTEND_BUILD: npm run build
  WAILS_GEN_BINDINGS: wails3 generate bindings

tasks:
  windows:build:
    summary: Build Windows application
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: common:prepare
      - go build -tags desktop -o "{{.BIN_DIR}}/{{.APP_NAME}}.exe"

  windows:package:
    summary: Package Windows application
    dir: "{{.ROOT_DIR}}"
    cmds:
      - task: windows:build

  windows:run:
    summary: Run Windows application
    dir: "{{.ROOT_DIR}}"
    cmds:
      - go run .
