version: '3'

tasks:
  go:mod:tidy:
    summary: Runs `go mod tidy`
    internal: true
    cmds:
      - go mod tidy

  install:frontend:deps:
    summary: Install frontend dependencies
    dir: ../frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    preconditions:
      - sh: npm version
        msg: "Looks like npm isn't installed. Npm is part of the Node installer: https://nodejs.org/en/download/"
    cmds:
      - npm install

  build:frontend:
    label: build:frontend (DEV={{.DEV}})
    summary: Build the frontend project
    dir: ../frontend
    sources:
      - "**/*"
      - exclude: node_modules/**/*
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - npm run {{.BUILD_COMMAND}} -q
    env:
      PRODUCTION: '{{if eq .DEV "true"}}false{{else}}true{{end}}'
    vars:
      BUILD_COMMAND: '{{if eq .DEV "true"}}dev{{else}}build{{end}}'

  generate:bindings:
    label: generate:bindings (BUILD_FLAGS={{.BUILD_FLAGS}})
    summary: Generates bindings for the frontend
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.[jt]s"
      - exclude: ../frontend/**/*
      - ../frontend/src/services/**/*
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - ../frontend/src/services/wailsjs/**/*
    cmds:
      - wails3 generate bindings -d ../frontend/src/services -f '{{.BUILD_FLAGS}}' -clean=true

  common:prepare:
    summary: Prepare for build
    deps:
      - task: install:frontend:deps
      - task: build:frontend
        vars:
          DEV: "false"
          BUILD_FLAGS: ""

  common:install:frontend:deps:
    summary: Install frontend dependencies
    cmds:
      - task: install:frontend:deps

  common:generate:
    summary: Generate bindings
    cmds:
      - task: generate:bindings
        vars:
          BUILD_FLAGS: ""

  common:build:frontend:
    summary: Build frontend
    cmds:
      - task: build:frontend
        vars:
          DEV: "false"
          BUILD_FLAGS: ""
